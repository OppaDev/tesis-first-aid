server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Expo web con output "static" genera un HTML por ruta;
    # el fallback a index.html cubre las rutas dinámicas del router.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Los assets exportados llevan hash en el nombre: caché larga e inmutable.
    location /_expo/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
