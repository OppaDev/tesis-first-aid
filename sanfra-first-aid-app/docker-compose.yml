services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: firstaid
      POSTGRES_USER: firstaid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firstaid -d firstaid"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - sanfra_net
    restart: unless-stopped

  backend:
    image: oppadev/first-aid:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://firstaid:${POSTGRES_PASSWORD}@db:5432/firstaid
      SECRET_KEY: ${SECRET_KEY:?Definir SECRET_KEY en .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Caché del modelo Whisper (se descarga solo la primera vez)
      - hf_cache:/data/hf-cache
    networks:
      - sanfra_net
    restart: unless-stopped

  frontend:
    image: oppadev/web-first-aid:latest
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - sanfra_net
    restart: unless-stopped

networks:
  sanfra_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

volumes:
  pgdata:
  hf_cache:
